name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    env:
      MOCK_LAMBDAS: "true"
      AURORA_CLUSTER_ARN: ${{ secrets.DATABASE_CLUSTER_ARN }}
      AURORA_SECRET_ARN: ${{ secrets.DATABASE_SECRET_ARN }}
      AURORA_DATABASE: ${{ secrets.DATABASE_NAME }}
      DEFAULT_AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_REGION_NAME: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync
          for agent in extractor analyzer charter interviewer orchestrator; do
            echo "Syncing $agent..."
            (cd $agent && uv sync)
          done

      - name: Run tests
        working-directory: backend
        run: uv run test_simple.py
