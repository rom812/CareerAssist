name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

  test:
    name: Unit Tests (Mocked)
    needs: lint
    runs-on: ubuntu-latest
    env:
      MOCK_LAMBDAS: "true"
      DATABASE_CLUSTER_ARN: "arn:aws:rds:us-east-1:000000000000:cluster:fake"
      DATABASE_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:000000000000:secret:fake"
      DATABASE_NAME: "career_assist"
      AWS_REGION_NAME: "us-east-1"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run mocked tests
        working-directory: backend
        run: uv run test_simple.py
